spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.type=com.zaxxer.hikari.HikariDataSource

spring.jackson.time-zone=Asia/Shanghai

spring.data.web.pageable.one-indexed-parameters=true
spring.data.web.pageable.serialization-mode=direct
spring.data.web.pageable.default-page-size=6
spring.data.web.pageable.max-page-size=20
spring.data.web.pageable.page-parameter=number
spring.data.web.pageable.size-parameter=size
spring.data.web.sort.sort-parameter=sort

spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=update
#spring.jpa.properties.hibernate.show_sql=true \u6A21\u5F0F spring.jpa.show-sql \u4E0B\u4E0D\u9700\u8981
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.type.json_format_mapper=jackson
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Shanghai
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_updates=true
#spring.jpa.properties.hibernate.cache.use_query_cache=true
#spring.jpa.properties.hibernate.cache.use_second_level_cache=true
spring.jpa.properties.hibernate.generate_statistics=true
spring.jpa.properties.hibernate.use_sql_comments=true
#spring.jpa.properties.jakarta.persistence.schema-generation.create-source=metadata \u6A21\u5F0F spring.jpa.hibernate.ddl-auto=update \u4E0B\u4E0D\u9700\u8981
#spring.jpa.properties.jakarta.persistence.schema-generation.scripts.action=create \u6A21\u5F0F spring.jpa.hibernate.ddl-auto=update \u4E0B\u4E0D\u9700\u8981
#spring.jpa.properties.jakarta.persistence.schema-generation.scripts.create-target=build/schema.sql \u6A21\u5F0F spring.jpa.hibernate.ddl-auto=update \u4E0B\u4E0D\u9700\u8981

#logging.file.name=logs/${spring.application.name}/app.log
#logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE
#logging.level.org.springframework.security=DEBUG
#logging.level.com.secure.security=DEBUG

spring.app.jwtSecret=${JWT_SECRET}

spring.data.redis.host=${SPRING_REDIS_HOST}
spring.data.redis.port=${SPRING_REDIS_PORT}
spring.data.redis.database=${SPRING_REDIS_DATABASE}
spring.data.redis.username=${SPRING_REDIS_USERNAME}
spring.data.redis.password=${SPRING_REDIS_PASSWORD}

management.endpoints.web.exposure.include=health,info
management.endpoints.web.base-path=/actuator

server.port=8080
server.address=::

spring.flyway.url=${spring.datasource.url}
spring.flyway.user=${spring.datasource.username}
spring.flyway.password=${spring.datasource.password}
spring.flyway.driver-class-name=${spring.datasource.driver-class-name}
spring.flyway.baseline-on-migrate=true
spring.flyway.enabled=false
spring.flyway.table=sys_flyway_history
spring.flyway.locations=classpath:db/ledger

spring.ai.openai.api-key=${OPENAI_API_KEY}
spring.ai.openai.base-url=${OPENAI_BASE_URL}
spring.ai.openai.chat.options.model=${OPENAI_CHAT_MODEL}

spring.ai.deepseek.api-key=${DEEPSEEK_API_KEY}
spring.ai.deepseek.base-url=${DEEPSEEK_BASE_URL}
spring.ai.deepseek.chat.options.model=${DEEPSEEK_CHAT_MODEL}